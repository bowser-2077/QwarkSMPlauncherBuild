name: Build QwarkSMP Launcher

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.10'

jobs:

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt

      - name: Build (Linux)
        run: |
          chmod +x build_all.sh
          ./build_all.sh

      - name: Verify output
        run: |
          test -f dist_build/linux/QwarkSMPLauncher
          test -f dist_build/linux/QwarkSMPLauncher-linux.tar.gz

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: dist_build/linux/QwarkSMPLauncher-linux.tar.gz


  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt

      - name: Build (Windows)
        shell: cmd
        run: |
          call build.bat

      - name: Verify output
        shell: cmd
        run: |
          if not exist dist_build\windows\QwarkSMPLauncher.exe exit /b 1
          if not exist dist_build\windows\QwarkSMPLauncher-windows.zip exit /b 1

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: dist_build/windows/QwarkSMPLauncher-windows.zip


  build-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt

      - name: Build (macOS)
        run: |
          chmod +x build_all.sh
          ./build_all.sh

      - name: Verify output
        run: |
          test -d dist_build/macos/QwarkSMPLauncher.app
          test -f dist_build/macos/QwarkSMPLauncher-macos.tar.gz

      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: dist_build/macos/QwarkSMPLauncher-macos.tar.gz


  release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          generate_release_notes: true
