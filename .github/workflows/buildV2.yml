name: Build QwarkSMP Launcher

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'
    - run: pip install -r requirements.txt
    - run: chmod +x build_all.sh && ./build_all.sh
    - uses: actions/upload-artifact@v3
      with:
        name: linux-release
        path: dist_build/linux/QwarkSMPLauncher-linux.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'
    - run: pip install -r requirements.txt
    - run: call build.bat
    - uses: actions/upload-artifact@v3
      with:
        name: windows-release
        path: dist_build/windows/QwarkSMPLauncher-windows.zip

  build-macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'
    - run: pip install -r requirements.txt
    - run: chmod +x build_all.sh && ./build_all.sh
    - uses: actions/upload-artifact@v3
      with:
        name: macos-release
        path: dist_build/macos/QwarkSMPLauncher-macos.tar.gz

  release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
      releases: write
    steps:
    - uses: actions/download-artifact@v3
      with:
        path: release-assets
    - uses: softprops/action-gh-release@v1
      with:
        files: release-assets/*
